name: CI

# CI auto-runs are DISABLED during development — no GitHub Actions billing on
# push/PR. The full pipeline below is preserved and can only be started
# manually (Actions tab -> Run workflow). The equivalent gate is run LOCALLY
# before commits (cargo fmt --all --check; cargo clippy --workspace
# --all-targets -- -D warnings; the two --features clippy builds; cargo test
# --workspace), which costs nothing.
#
# TO RE-ENABLE before launch, restore the auto-triggers:
#   push:
#     branches: [main]
#   pull_request:
#     branches: [main]
on:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # Fast gates that should fail loud on any regression. Style + lint
  # gate runs first because it returns in seconds; nothing else is
  # worth checking on a branch that doesn't pass these.
  lint:
    name: fmt + clippy (strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-lint

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev libsqlite3-dev libpq-dev

      - name: cargo fmt --check
        run: cargo fmt --all --check

      - name: cargo clippy --workspace -- -D warnings
        run: cargo clippy --workspace --all-targets -- -D warnings

  # Functional gate — workspace test suite on the default feature set.
  # The vector-pinecone feature is exercised separately in test-features
  # because it pulls a dep chain with active RustSec advisories
  # (production gate #370).
  #
  # Matrix runs Ubuntu + macOS. Windows is deferred to v0.1.x per
  # release-prep §2.2 (sqlx Postgres deps require non-trivial Windows
  # setup; not blocking the initial release).
  test:
    name: cargo test --workspace (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-test-${{ matrix.os }}

      - name: Install system dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev libsqlite3-dev libpq-dev

      - name: Install system dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install pkg-config libpq
          brew link --force libpq

      - name: cargo test --workspace
        run: cargo test --workspace --no-fail-fast

  # Exercise the opt-in features so feature-gated code can't silently
  # rot.
  test-features:
    name: cargo test --features (opt-in modules)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-test-features

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev libsqlite3-dev libpq-dev

      - name: cargo test --features vector-pinecone
        run: cargo test -p suprnova --features vector-pinecone --no-fail-fast

      - name: cargo test --features broadcasting-fanout
        run: cargo test -p suprnova --features broadcasting-fanout --no-fail-fast

  # Generated-project gate — scaffold a project and `cargo check` it against
  # the in-tree framework. Catches the entire class of "scaffold templates
  # drift from the framework API" (e.g. a removed Eloquent method, a
  # re-exported-crate version bump) before a user hits it on `suprnova new`.
  # The scaffold_snapshot compile checks are `#[ignore]`d in the suite
  # (~40s each, they compile a whole generated project) so they don't slow
  # local `cargo test`; CI is where they run.
  #
  # Matrix runs Ubuntu + macOS. Catches "scaffolded project doesn't
  # compile on macOS" issues (hardcoded path separators, OS-specific
  # paths) before they ship to a user via `suprnova new`.
  scaffold:
    name: scaffold compiles (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-scaffold-${{ matrix.os }}

      - name: Install system dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev libsqlite3-dev libpq-dev

      - name: Install system dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install pkg-config libpq
          brew link --force libpq

      - name: scaffold_snapshot compile checks (default + api starters)
        run: cargo test -p suprnova-cli --test scaffold_snapshot -- --ignored

  # Security gate. `.cargo/audit.toml` defines documented ignores for
  # advisories whose dep paths are feature-gated off in the default
  # build (see production gate #370).
  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-audit

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: cargo audit
        run: cargo audit

  # Rustdoc link hygiene — ratcheting gate. Counts current
  # `cargo doc` warnings against a hard-coded baseline; any regression
  # (more warnings than the baseline) fails the build. Once the
  # baseline reaches 0, escalate the inner-attributes in
  # framework/src/lib.rs from `#![warn(...)]` to `#![deny(...)]` and
  # delete this job — the build itself becomes the gate.
  #
  # When you fix warnings, ratchet RUSTDOC_BASELINE downward in the
  # SAME commit so the new floor sticks. Tracked in release-prep §3.3.
  doc:
    name: rustdoc link hygiene
    runs-on: ubuntu-latest
    env:
      RUSTDOC_BASELINE: 108
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-doc

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev libsqlite3-dev libpq-dev

      - name: cargo doc -p suprnova --no-deps
        run: |
          cargo doc -p suprnova --no-deps 2> /tmp/rustdoc.log || true
          count=$(grep -c "^warning:" /tmp/rustdoc.log || true)
          count=${count:-0}
          echo "rustdoc warnings: $count (baseline: $RUSTDOC_BASELINE)"
          if [ "$count" -gt "$RUSTDOC_BASELINE" ]; then
            echo "::error::rustdoc warnings regressed: $count > $RUSTDOC_BASELINE"
            grep "^warning:" /tmp/rustdoc.log | head -20
            exit 1
          fi
          if [ "$count" -lt "$RUSTDOC_BASELINE" ]; then
            echo "::warning::rustdoc warnings dropped below baseline ($count < $RUSTDOC_BASELINE) — ratchet RUSTDOC_BASELINE down in .github/workflows/ci.yml"
          fi
